name: Deploy Telegram Bot to Fly.io

on:
  push:
    branches: [master]
    paths:
      - 'bot-telegram/**'
      - '.github/workflows/fly-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create Fly.io App (if not exists)
        run: flyctl apps create aethersy-telegram-bot --org personal || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        working-directory: bot-telegram

      - name: Set Secrets
        run: |
          flyctl secrets set \
            TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            LARA_WEBHOOK_URL="${{ secrets.LARA_WEBHOOK_URL }}" \
            MAILERLITE_WEBHOOK_ID="${{ secrets.MAILERLITE_WEBHOOK_ID }}" \
            ADMIN_TELEGRAM_ID="${{ secrets.ADMIN_TELEGRAM_ID }}" \
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        working-directory: bot-telegram

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --no-cache
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        working-directory: bot-telegram

      - name: Verify deployment
        run: flyctl status --app aethersy-telegram-bot
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
